<header style="padding: 1.4em 0; border-bottom: 1px solid #eee;">
    <nav class="main-nav" style="max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 1.2em;">
        <a href="index.html" style="font-weight: bold; font-size: 1.2em; text-decoration: none; color: #000;">پوسیده;</a>

        <div style="display: flex; gap: 1.6em; font-size: .95em;">
            <a href="about.html" style="text-decoration:none; color:#555;">درباره</a>
            <a href="writing.html" style="text-decoration:none; color:#555;">نوشته‌ها</a>
            <a href="contact.html" style="text-decoration:none; color:#555;">تماس</a>
        </div>
    </nav>
</header>

<section class="section-contact">
    <div class="container">
        <div class="content-narrow">
            <h1>تماس</h1>

            <p class="lead" style="margin-bottom:2em;">
                اگر چیزی هست که دلت می‌خواهد بگویی،<br>
                می‌توانی اینجا بنویسی.<br>
                لازم نیست رسمی باشد،<br>
                لازم نیست کامل باشد.<br>
                ما فقط می‌خوانیم.
            </p>

            <form class="contact-form">
                <div class="form-group">
                    <label>نام</label>
                    <input type="text" required>
                </div>

                <div class="form-group">
                    <label>ایمیل</label>
                    <input type="email" required>
                </div>

                <div class="form-group">
                    <label>پیام</label>
                    <textarea rows="6" required></textarea>
                </div>

                <button class="btn-submit">نوشتن و رها کردن</button>
            </form>
        </div>
    </div>
</section>

<footer class="site-footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-logo">پوسیده;</div>
        </div>
    </div>
</footer>
